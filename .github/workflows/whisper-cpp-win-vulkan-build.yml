name: Build whisper.cpp (Windows Vulkan)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress

          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

          if (-not $env:VULKAN_SDK) {
            $sdk = Get-ChildItem "C:\VulkanSDK" -Directory |
              Sort-Object Name -Descending |
              Select-Object -First 1

            $env:VULKAN_SDK = $sdk.FullName
          }

          "VULKAN_SDK=$env:VULKAN_SDK" | Out-File $env:GITHUB_ENV -Append
          "$env:VULKAN_SDK\Bin" | Out-File $env:GITHUB_PATH -Append

          Write-Host "Using Vulkan SDK: $env:VULKAN_SDK"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DGGML_VULKAN=ON `
            -DVulkan_INCLUDE_DIR="$env:VULKAN_SDK\Include" `
            -DVulkan_LIBRARY="$env:VULKAN_SDK\Lib\vulkan-1.lib" `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifact | Out-Null

          Get-ChildItem build -Recurse -Include *.exe |
            Copy-Item -Destination artifact -Force

          Get-ChildItem build -Recurse -Include *.dll |
            Copy-Item -Destination artifact -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispercpp-windows-vulkan
          path: artifact
