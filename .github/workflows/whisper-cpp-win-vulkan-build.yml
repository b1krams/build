name: Build whisper.cpp (Windows Vulkan)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $ProgressPreference = "SilentlyContinue"

          $version = "1.4.350.0"
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/vulkansdk-windows-X64-$version.exe"

          Invoke-WebRequest -Uri $url -OutFile VulkanSDK.exe

          Start-Process .\VulkanSDK.exe `
            -ArgumentList "/S" `
            -Wait `
            -WindowStyle Hidden

          $sdk = "C:\VulkanSDK\$version"

          if (!(Test-Path $sdk)) {
            throw "Vulkan SDK installation failed."
          }

          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DGGML_VULKAN=ON `
            -DVulkan_INCLUDE_DIR="$env:VULKAN_SDK\Include" `
            -DVulkan_LIBRARY="$env:VULKAN_SDK\Lib\vulkan-1.lib"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null

          Get-ChildItem build -Recurse -Filter *.exe | Copy-Item -Destination artifact -Force
          Get-ChildItem build -Recurse -Filter *.dll | Copy-Item -Destination artifact -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispercpp-windows-vulkan
          path: artifact
