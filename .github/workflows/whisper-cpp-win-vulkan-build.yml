name: Build whisper.cpp (Windows Vulkan)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          fetch-depth: 1

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          choco install vulkan-sdk -y

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DGGML_VULKAN=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact

          Get-ChildItem build -Recurse -Filter *.exe | ForEach-Object {
            Copy-Item $_.FullName artifact\
          }

          Get-ChildItem build -Recurse -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName artifact\
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whispercpp-windows-vulkan
          path: artifact
